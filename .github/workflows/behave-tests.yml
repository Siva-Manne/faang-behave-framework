name: Behave BDD Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install behave==1.3.3 selenium webdriver-manager
        
    - name: Run Behave Smoke Tests
      run: |
        mkdir -p reports
        behave -t "@smoke" --format json --outfile reports/behave_report.json
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: behave-report
        path: reports/