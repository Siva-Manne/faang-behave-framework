name: Behave Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to run'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - uat
      tags:
        description: 'Behave tags'
        required: false
        default: 'smoke'
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure
        run: |
          sudo apt-get install -y openjdk-17-jre
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Prepare report dir
        run: mkdir -p reports/allure-results reports/allure-report

      - name: Run Behave Tests
        run: |
          ENV=${{ github.event.inputs.env || 'qa' }}
          TAGS=${{ github.event.inputs.tags || 'smoke' }}
          behave -D "env=$ENV" -t "$TAGS" -f allure_behave.formatter:AllureFormatter -o reports/allure-results

      - name: Generate Allure Report
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: reports/allure-report

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        