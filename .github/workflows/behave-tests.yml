name: Behave Tests

on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure
        run: |
          sudo apt-get install -y openjdk-17-jre
          wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Prepare report dir
        run: mkdir -p reports/allure-results reports/allure-report

      - name: Run Behave Tests
        run: |
          behave -D env=qa -t "smoke" -f allure_behave.formatter:AllureFormatter -o reports/allure-results

      - name: Generate Allure Report
        run: |
          allure generate reports/allure-results -o reports/allure-report --clean

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reports/allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4